<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Login - Controle de Saídas</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="container">
    <h1>Bem-vindo ao <span>D.M.E</span></h1>
    <form id="form-login">
      <label for="email">Email:</label>
      <input type="email" id="email" required />
      
      <label for="senha">Senha:</label>
      <input type="password" id="senha" required />
      
      <button type="submit">Entrar</button>
    </form>

    <footer>
      <p>Sistema Elaborado por <strong>Maviael Ananias</strong></p>
    </footer>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
